<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Coram Deo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-overlay" style="position:fixed;top:0;left:0;width:100%;z-index:9999;background:red;color:white;padding:20px;display:none;font-family:monospace;white-space:pre-wrap;"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.innerText += 'Error: ' + msg + '\n' + (error && error.stack ? error.stack : '') + '\n\n';
      };
      window.onunhandledrejection = function(event) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.innerText += 'Unhandled Rejection: ' + event.reason + '\n' + (event.reason && event.reason.stack ? event.reason.stack : '') + '\n\n';
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
