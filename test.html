<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background-color: #f3f4f6;
}
.app-container {
  width: 100%;
  max-width: 400px;
  height: 100vh;
  max-height: 850px;
  background: linear-gradient(135deg, #F9FAFB 0%, #F3F4F6 100%);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
}
.screens {
  flex: 1;
  position: relative;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 90px;
}
</style>
</head>
<body>
  <div class="app-container">
    <main class="screens" style="padding: 0; margin: 0; width: 100%; height: 100%; display: flex; flex-direction: column;">
      <div style="flex: 1; width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; background: #000; color: #fff; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0;">
          <div style="width: 100%; height: 100%; background: red;">SCANNER MOCK</div>
        </div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 2px solid white;"></div>
      </div>
    </main>
  </div>
</body>
</html>
